<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Swaps — UniSwap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#0f172a; --surface:#1e293b; --card:#243044; --accent:#f43f5e; --text:#e2e8f0; --muted:#94a3b8; --success:#10b981; --warn:#f59e0b; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
    .navbar { background:var(--surface)!important; border-bottom:2px solid var(--accent); padding:.7rem 2rem; }
    .navbar-brand { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; color:var(--accent)!important; }
    .nav-link { color:var(--muted)!important; font-weight:500; }
    .nav-link:hover,.nav-link.active { color:var(--accent)!important; }
    .session-bar { background:#1e3a5f; padding:.5rem 2rem; display:flex; align-items:center; gap:.8rem; font-size:.85rem; }
    .session-bar label { color:var(--muted); margin:0; }
    .session-bar input { background:var(--surface); border:1px solid #334155; color:var(--text); border-radius:6px; padding:.2rem .6rem; width:70px; font-size:.85rem; }
    .session-bar button { background:var(--accent); border:none; color:#fff; border-radius:6px; padding:.25rem .8rem; font-size:.85rem; cursor:pointer; }
    .hero { background:linear-gradient(135deg,var(--surface),#1e3a5f); padding:2rem; border-bottom:1px solid #1e3a5f; }
    .hero h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.9rem; margin:0; }
    .hero h1 span { color:var(--accent); }
    .hero p { color:var(--muted); margin:.3rem 0 0; font-size:.92rem; }
    .main { padding:1.5rem 2rem; }
    .sec-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; margin-bottom:.9rem; display:flex; align-items:center; gap:.5rem; }
    .swap-card { background:var(--card); border:1px solid #1e3a5f; border-radius:12px; padding:1rem 1.2rem; margin-bottom:.7rem; }
    .swap-card.incoming { border-left:3px solid var(--accent); }
    .swap-card .title { font-weight:600; font-size:.92rem; }
    .swap-card .sub { font-size:.82rem; color:var(--muted); margin-top:.2rem; }
    .swap-card .arrow { color:var(--accent); font-weight:700; margin:0 .3rem; }
    .badge-open      { background:#065f46; color:#6ee7b7; border-radius:6px; padding:.15rem .5rem; font-size:.75rem; }
    .badge-pending   { background:#78350f; color:#fcd34d; border-radius:6px; padding:.15rem .5rem; font-size:.75rem; }
    .badge-completed { background:#1e3a5f; color:#60a5fa; border-radius:6px; padding:.15rem .5rem; font-size:.75rem; }
    .badge-cancelled,.badge-rejected { background:#2d1f1f; color:#fca5a5; border-radius:6px; padding:.15rem .5rem; font-size:.75rem; }
    .badge-accepted  { background:#065f46; color:#6ee7b7; border-radius:6px; padding:.15rem .5rem; font-size:.75rem; }
    .btn-act { border:none; border-radius:7px; padding:.32rem .75rem; font-size:.8rem; font-weight:600; cursor:pointer; }
    .btn-accept { background:var(--success); color:#fff; }
    .btn-reject { background:#334155; color:var(--muted); }
    .btn-cancel { background:#334155; color:var(--muted); }
    .btn-act:hover { opacity:.8; }
    .divider { border-top:1px solid #1e3a5f; margin:1.8rem 0; }
    .empty { text-align:center; padding:2rem; color:var(--muted); font-size:.88rem; }
    .toast-container { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; }
    .toast { background:var(--card); border:1px solid var(--accent); border-radius:10px; color:var(--text); }
    .toast.ok { border-color:var(--success); }
    .btn-close { filter:invert(1); }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <a class="navbar-brand" href="index.html">🔁 UniSwap</a>
  <div class="collapse navbar-collapse">
    <ul class="navbar-nav ms-auto gap-1">
      <li class="nav-item"><a class="nav-link" href="index.html">📋 Swap Board</a></li>
      <li class="nav-item"><a class="nav-link active" href="my-swaps.html">👤 My Swaps</a></li>
      <li class="nav-item"><a class="nav-link" href="create-offer.html">➕ Post Offer</a></li>
    </ul>
  </div>
</nav>

<div class="session-bar">
  <label>Your Student ID:</label>
  <input type="number" id="sid" value="1" min="1"/>
  <button onclick="loadAll()">Load My Swaps</button>
</div>

<div class="hero">
  <h1>My <span>Swaps</span></h1>
  <p>Manage your offers and respond to incoming trade requests.</p>
</div>

<div class="main">
  <div class="row g-4">

    <!-- My Offers -->
    <div class="col-lg-6">
      <div class="sec-title">📋 My Posted Offers</div>
      <div id="myOffers"><div class="empty">Click "Load My Swaps" to start.</div></div>
    </div>

    <!-- Incoming Requests -->
    <div class="col-lg-6">
      <div class="sec-title">📥 Incoming Requests</div>
      <div id="incoming"><div class="empty">Click "Load My Swaps" to start.</div></div>
    </div>

  </div>

  <div class="divider"></div>

  <!-- Sent Requests -->
  <div class="sec-title">📤 Requests I Sent</div>
  <div id="sent"><div class="empty">Click "Load My Swaps" to start.</div></div>
</div>

<div class="toast-container">
  <div id="toast" class="toast align-items-center">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
const API = 'http://localhost:8080/api';
function sid() { return parseInt(document.getElementById('sid').value) || 1; }
window.onload = () => loadAll();

async function loadAll() {
  await Promise.all([loadOffers(), loadIncoming(), loadSent()]);
}

// ── My Offers ──────────────────────────────────────────────
async function loadOffers() {
  try {
    const r = await axios.get(`${API}/swaps/offers/my?studentId=${sid()}`);
    const list = r.data.data || [];
    const el = document.getElementById('myOffers');
    if (!list.length) { el.innerHTML = '<div class="empty">No offers yet. <a href="create-offer.html" style="color:var(--accent)">Post one!</a></div>'; return; }
    el.innerHTML = list.map(o => `
      <div class="swap-card">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="title">${o.haveSection?.course?.courseName}</div>
            <div class="sub">
              <span style="color:#60a5fa">Sec ${o.haveSection?.sectionNumber}</span>
              <span class="arrow">⇄</span>
              <span style="color:#c084fc">${o.wantDescription}</span>
            </div>
            <div class="sub" style="margin-top:.3rem">${new Date(o.createdAt).toLocaleDateString()}</div>
          </div>
          <div class="d-flex flex-column align-items-end gap-1">
            ${badge(o.status)}
            ${o.status==='OPEN'||o.status==='PENDING' ? `<button class="btn-act btn-cancel" onclick="cancelOffer(${o.offerId})">Cancel</button>` : ''}
          </div>
        </div>
      </div>`).join('');
  } catch(e) { document.getElementById('myOffers').innerHTML = '<div class="empty">⚠️ Could not load.</div>'; }
}

// ── Incoming Requests ──────────────────────────────────────
async function loadIncoming() {
  try {
    const r = await axios.get(`${API}/swaps/requests/incoming?studentId=${sid()}`);
    const list = r.data.data || [];
    const el = document.getElementById('incoming');
    if (!list.length) { el.innerHTML = '<div class="empty">No incoming requests.</div>'; return; }
    el.innerHTML = list.map(req => `
      <div class="swap-card incoming">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="title">From: <strong>${req.sender?.name||'Student '+req.sender?.studentId}</strong></div>
            <div class="sub">They offer: <span style="color:#60a5fa">${req.senderSection?.course?.courseName} — Sec ${req.senderSection?.sectionNumber}</span></div>
            <div class="sub">For your: <span style="color:#c084fc">${req.offer?.haveSection?.course?.courseName} — Sec ${req.offer?.haveSection?.sectionNumber}</span></div>
            <div class="sub" style="margin-top:.3rem">${badge(req.status)}</div>
          </div>
          ${req.status==='PENDING' ? `
          <div class="d-flex flex-column gap-1">
            <button class="btn-act btn-accept" onclick="accept(${req.requestId})">✓ Accept</button>
            <button class="btn-act btn-reject" onclick="reject(${req.requestId})">✕ Reject</button>
          </div>` : ''}
        </div>
      </div>`).join('');
  } catch(e) { document.getElementById('incoming').innerHTML = '<div class="empty">⚠️ Could not load.</div>'; }
}

// ── Sent Requests ──────────────────────────────────────────
async function loadSent() {
  try {
    const r = await axios.get(`${API}/swaps/requests/sent?studentId=${sid()}`);
    const list = r.data.data || [];
    const el = document.getElementById('sent');
    if (!list.length) { el.innerHTML = '<div class="empty">No sent requests.</div>'; return; }
    el.innerHTML = '<div class="row g-3">' + list.map(req => `
      <div class="col-md-6">
        <div class="swap-card">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="title">To: <strong>${req.receiver?.name||'Student '+req.receiver?.studentId}</strong></div>
              <div class="sub">I offer: <span style="color:#60a5fa">${req.senderSection?.course?.courseName} — Sec ${req.senderSection?.sectionNumber}</span></div>
              <div class="sub">For their: <span style="color:#c084fc">${req.offer?.haveSection?.course?.courseName} — Sec ${req.offer?.haveSection?.sectionNumber}</span></div>
              <div class="sub" style="margin-top:.3rem">${badge(req.status)}</div>
            </div>
            ${req.status==='PENDING' ? `<button class="btn-act btn-cancel" onclick="cancelReq(${req.requestId})">Cancel</button>` : ''}
          </div>
        </div>
      </div>`).join('') + '</div>';
  } catch(e) { document.getElementById('sent').innerHTML = '<div class="empty">⚠️ Could not load.</div>'; }
}

// ── Actions ────────────────────────────────────────────────
async function accept(id) {
  try {
    const r = await axios.post(`${API}/swaps/requests/${id}/accept?studentId=${sid()}`);
    showToast('🎉 ' + r.data.message, true); loadAll();
  } catch(e) { showToast('❌ ' + (e.response?.data?.message||'Failed'), false); }
}
async function reject(id) {
  try { await axios.post(`${API}/swaps/requests/${id}/reject?studentId=${sid()}`); showToast('Request rejected.', true); loadAll(); }
  catch(e) { showToast('❌ ' + (e.response?.data?.message||'Failed'), false); }
}
async function cancelOffer(id) {
  try { await axios.delete(`${API}/swaps/offers/${id}?studentId=${sid()}`); showToast('Offer cancelled.', true); loadAll(); }
  catch(e) { showToast('❌ ' + (e.response?.data?.message||'Failed'), false); }
}
async function cancelReq(id) {
  try { await axios.delete(`${API}/swaps/requests/${id}?studentId=${sid()}`); showToast('Request cancelled.', true); loadAll(); }
  catch(e) { showToast('❌ ' + (e.response?.data?.message||'Failed'), false); }
}

function badge(s) {
  const map = { OPEN:'badge-open', PENDING:'badge-pending', COMPLETED:'badge-completed', CANCELLED:'badge-cancelled', ACCEPTED:'badge-accepted', REJECTED:'badge-rejected' };
  return `<span class="${map[s]||'badge-cancelled'}">${s}</span>`;
}
function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.className = `toast align-items-center ${ok?'ok':''}`;
  document.getElementById('toastBody').textContent = msg;
  new bootstrap.Toast(t, {delay:3500}).show();
}
</script>
</body>
</html>
